services:
  # Moodle Backend Service
  - type: web
    name: lumina-moodle-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      # Paste your connection strings into these in the Render Dashboard
      - key: DATABASE_URL
        # Set this value in the Render dashboard (Settings -> Environment)
      - key: MOODLE_DATA_DIR
        value: /var/moodledata
      - key: MOODLE_ADMIN_PASS
        value: Admin1234!
