services:
  # Moodle Backend Service
  - type: web
    name: lumina-moodle-backend
    env: docker
    region: ohio # or your preferred region
    plan: free # Using free plan as requested
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lumina-moodle-db
          property: internalConnectionString
      - key: MOODLE_DATA_DIR
        value: /var/moodledata

databases:
  # Managed PostgreSQL Database
  - name: lumina-moodle-db
    plan: free
    region: ohio
    databaseName: moodle
    user: postgres
